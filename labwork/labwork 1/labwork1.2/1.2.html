<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Portal</title>
</head>

<body style="font-family:Arial; border:2px solid black; width:850px; margin:auto; padding:20px;">

<h2 style="text-align:center;">🎓 Student Registration Portal</h2>

<p align="center">
Please complete the <mark>Registration Form</mark> carefully.
</p>

<hr>

<form>

<fieldset>
<legend><b>Personal Information</b></legend>

<label>Full Name:</label><br>
<input type="text" placeholder="Enter your name"><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter your email"><br><br>

<label>Password:</label><br>
<input type="password"><br><br>

<label>Mobile Number:</label><br>
<input type="tel"><br><br>

<label>Date of Birth:</label><br>
<input type="date"><br><br>

<label>Age:</label><br>
<input type="number" min="18" max="60"><br><br>

</fieldset>

<br>

<fieldset>
<legend><b>Academic Details</b></legend>

<label>Course:</label><br>

<select>
<option>BCA</option>
<option>B.Sc IT</option>
<option>B.Com</option>
<option>BBA</option>
</select>

<br><br>

<label>Gender:</label><br>

<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other

<br><br>

<label>Skills:</label><br>

<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> JavaScript
<input type="checkbox"> Python

</fieldset>

<br>

<fieldset>
<legend><b>Address</b></legend>

<textarea rows="4" cols="40"></textarea>

</fieldset>

<br>

<label>Upload Photo:</label><br>
<input type="file">

<br><br>

<input type="submit" value="Register">
<input type="reset" value="Reset">

</form>

<hr>

<p align="center">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/99/Sample_User_Icon.png"
width="80">

<br><br>

<mark>Registration opens until 31<sup>st</sup> July 2026</mark>

<br><br>

<b>"Education is the key to success."</b>

</p>

</body>
</html>
